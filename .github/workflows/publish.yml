name: Publish to Maven Central

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.0"
          cache-read-only: false

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Publish to Maven Central
        run: ./gradlew :dynamodb-simplified-core:publish
        env:
          # Maven Central credentials (ORG_GRADLE_PROJECT_* prefix makes them visible to project.findProperty)
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_PASSWORD }}
          # GPG signing
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

      - name: Close and upload staging repository to Central Portal
        run: |
          TOKEN="${{ secrets.SONATYPE_USERNAME }}:${{ secrets.SONATYPE_PASSWORD }}"
          B64_TOKEN=$(echo -n "$TOKEN" | base64 -w0)
          curl -s -X POST \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/dev.hogwai?publishing_type=automatic" \
            -H "Authorization: Bearer $B64_TOKEN"
